<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Logístico - Monitoramento de Entregas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Painel de Controle Logístico</h1>

    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-title">Total de Remessas</div>
            <div class="kpi-value" id="kpi-total">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">No Prazo</div>
            <div class="kpi-value" id="kpi-prazo" style="color: var(--success)">0</div>
        </div>
        <div class="kpi-card alert">
            <div class="kpi-title">Atrasadas</div>
            <div class="kpi-value" id="kpi-atraso" style="color: var(--danger)">0</div>
        </div>
        <div class="kpi-card alert">
            <div class="kpi-title">Taxa de Atraso</div>
            <div class="kpi-value" id="kpi-taxa">0%</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container">
            <h2>Atrasos por Transportadora</h2>
            <canvas id="chartTransportadora"></canvas>
        </div>
        <div class="chart-container">
            <h2>Atrasos por Região (Destino)</h2>
            <canvas id="chartRegiao"></canvas>
        </div>
    </div>

    <div class="table-container">
        <h2>Fila de Priorização: Entregas Críticas (Atrasadas)</h2>
        <table id="tabela-atrasos">
            <thead>
                <tr>
                    <th>ID Carga (Container/Lote)</th>
                    <th>Transportadora</th>
                    <th>Região</th>
                    <th>Dias de Atraso</th>
                    <th>Status/Ação</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
